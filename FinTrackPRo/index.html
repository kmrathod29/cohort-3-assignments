<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack Pro</title>
    <!-- Remix Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">

        <div class="logo">
            <i class="ri-wallet-3-line"></i>
            <h2>FinTrack Pro</h2>
        </div>

        <nav>
            <button class="nav-btn active">
                <i class="ri-dashboard-line"></i>
                Dashboard
            </button>
            <button class="nav-btn">
                <i class="ri-settings-3-line"></i>
                Settings
            </button>
            <button class="theme-btn">
                <i class="ri-moon-line"></i>
            </button>
        </nav>

    </header>

    <main class="container">

        <section class="hero">
            <h1>Personal Finance Tracker</h1>
            <p>Track your income, expenses and financial balance in one place.</p>
        </section>

        <section class="summary-section">
            <div class="summary-card">
                <i class="ri-wallet-3-line"></i>
                <h4>Total Balance</h4>
                <h2 id="balance">₹0</h2>
            </div>

            <div class="summary-card">
                <i class="ri-arrow-up-circle-line"></i>
                <h4>Total Income</h4>
                <h2 id="income">₹0</h2>
            </div>

            <div class="summary-card">
                <i class="ri-arrow-down-circle-line"></i>
                <h4>Total Expense</h4>
                <h2 id="expense">₹0</h2>
            </div>
        </section>

        <section class="transaction-section">
            <div class="section-heading">
                <h2>Add Transaction</h2>
            </div>

            <form id="transaction-form">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="Enter transaction title">
                </div>

                <div class="input-group">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount">
                </div>

                <div class="input-group">

                    <label>Category</label>
                    <select id="category">
                        <option value="">Select Category</option>
                        <option>Food</option>
                        <option>Shopping</option>
                        <option>Travel</option>
                        <option>Salary</option>
                        <option>Bills</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="input-group">

                    <label>Transaction Type</label>
                    <select id="type">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>

                <button type="submit">
                    <i class="ri-add-circle-line"></i>Add Transaction
                </button>
            </form>
        </section>

        <section class="filter-section">
            <div class="section-heading">
                <h2>Filter Transactions</h2>
            </div>

            <div class="filter-box">

                <input type="text" id="search" placeholder="Search transaction">

                <select id="filter">
                    <option value="all">All</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
        </section>

        <section class="history-section">
            <div class="section-heading">
                <h2>Transaction History</h2>
            </div>

            <div id="transaction-list">
                <!-- JS -->
            </div>
        </section>

        <section class="chart-section">
            <div class="section-heading">
                <h2>Expense Overview</h2>
            </div>
            <canvas id="expenseChart"></canvas>
        </section>

        <section class="settings-section">
            <div class="section-heading">
                <h2>Settings</h2>
            </div>

            <div class="setting-card">
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" id="username" placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <label>Preferred Currency</label>
                    <select id="currency">
                        <option value="₹">INR (₹)</option>
                        <option value="$">USD ($)</option>
                        <option value="€">EUR (€)</option>
                        <option value="£">GBP (£)</option>
                        <option value="¥">JPY (¥)</option>
                    </select>
                </div>

                <button id="reset-data">
                    <i class="ri-delete-bin-line"></i>Reset All Data
                </button>
            </div>
        </section>

    </main>
    <script src="script.js"></script>
</body>

</html>
