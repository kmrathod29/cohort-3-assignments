<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <title>Squid Game</title>
</head>

<body>
    <div class="main">
        <div class="navbar">
            <div class="left-part">
                <img src="./logo-nav.png" alt="">
            </div>
            <div class="center-part">
                <ul class="nav-links">
                    <li><a href="">About</a></li>
                    <li><a href="" class="active">Watch Now</a></li>
                    <li><a href="">Actor</a></li>
                    <li><a href="">Contact</a></li>
                </ul>
            </div>
            <div class="right-part">
                <i class="ri-menu-2-line"></i>
            </div>
        </div>
        <div class="hero-section">
            <div class="top-content">
                <div class="left-part">
                    <img class="hero-logo" src="./hero-logo.png" alt="">
                    <div class="description">
                        <p>
                            Action / Thriller / Drama Series directed by Dong-hyuk Hwang <br> Season 1:9 Episodes
                        </p>
                    </div>
                    <div class="btn-part">
                        <div class="play-btn btn"><i class="ri-play-circle-line"></i>Play Now</div>
                        <div class="watch-btn btn"><i class="ri-play-line"></i>Watch Trailer</div>
                    </div>
                </div>
                <div class="center-part">
                    <div class="vertical-text">
                        <h4>Scroll</h4>
                        <div class="line"></div>
                    </div>
                    <div class="character-img">
                        <img src="./square-mask-man.png" alt="">
                    </div>
                </div>

                <div class="right-part social-icons">
                    <i class="ri-instagram-line"></i>
                    <i class="ri-facebook-line"></i>
                    <i class="ri-twitter-x-line"></i>
                </div>
            </div>

            <div class="bottom-content">
                <div class="cards">
                    <div class="img-card card-1">
                        <div class="play-icon">
                            <i class="ri-play-fill"></i>
                        </div>
                    </div>
                    <div class="img-card card-2">
                        <div class="play-icon">
                            <i class="ri-play-fill"></i>
                        </div>
                    </div>
                    <div class="img-card card-3">
                        <div class="play-icon">
                            <i class="ri-play-fill"></i>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    </div>
</body>

</html>
