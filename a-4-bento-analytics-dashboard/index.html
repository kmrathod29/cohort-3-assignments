<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link href="
https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-svg-core@7.2.0/styles.min.css
" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>l̥
    <main>
        <section class="left-section">
            <div class="left-top">
                <div class="heading">
                    <h3>Brand of <br> Designing</h3>
                    <i class="ri-more-line"></i>
                </div>
                <div class="progress-img">
                    <img src="./75-progress-img.png" alt="">
                </div>
                <div class="info">
                    <h1>2.5K</h1>
                    <p>263 contributions in <br> the last year</p>
                    <button>View Report <i class="ri-arrow-drop-right-line"></i></button>
                </div>
            </div>
            <div class="left-bottom">
                <div class="heading">
                    <h2>Smart Digital <br>Agency for Your <br> <span>Business</span></h2>
                    <i class="ri-arrow-right-up-line"></i>
                </div>
                <div class="middle-card">
                    <div class="card"><img src="./person-1.jpg" alt=""></div>
                    <div class="card"><img src="./person-2.jpg" alt=""></div>
                </div>
                <div class="last">
                    <div class="circle-card"><img src="./profile-pic-1.jpg" alt=""></div>
                    <div class="circle-card"><img src="./profile-pic-2.jpg" alt=""></div>
                    <div class="circle-card"><img src="./profile-pic-3.jpg" alt=""></div>
                    <div class="circle-card add-div"><i class="ri-add-line"></i></div>
                </div>
            </div>
        </section>
        <section class="center-section">
            <div class="center-top">
                <div class="center-top-left">
                    <div class="heading">
                        <h2>4.875</h2>
                        <i class="ri-heart-fill"></i>
                    </div>
                    <div class="middle">
                        <p>Project Views <br>Last Year</p>
                    </div>
                    <div class="last">
                        <div class="static">
                            <i class="fa-regular fa-arrow-trend-up"></i>
                            <p>+15%</p>
                        </div>
                        <p class="text">vs last year</p>
                    </div>
                </div>
                <div class="center-top-right">
                    
                </div>
            </div>
            <div class="center-middle">
                <img class="girl-img" src="./girl.png" alt="">
                <div class="bg-wrapper">
                    <img class="bg-img" src="./center-bg.png" alt="">
                </div>
            </div>
            <div class="center-bottom">
                <div class="center-bottom-left"></div>
                <div class="center-bottom-right"></div>
            </div>
        </section>
        <section class="right-section">
            <div class="right-top"></div>
            <div class="right-bottom"></div>
        </section>
    </main>
</body>

</html>
