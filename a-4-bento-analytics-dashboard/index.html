<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section class="left-section">
            <div class="left-top">
                <div class="heading">
                    <h3>Brand of <br> Designing</h3>
                    <i class="ri-more-line"></i>
                </div>
                <div class="progress-img">
                    <img src="./75-progress-img.png" alt="">
                </div>
                <div class="info">
                    <h1>2.5K</h1>
                    <p>263 contributions in <br> the last year</p>
                    <button>View Report <i class="ri-arrow-drop-right-line"></i></button>
                </div>
            </div>
            <div class="left-bottom"></div>
        </section>
        <section class="center-section">
            <div class="center-top">
                <div class="center-top-left"></div>
                <div class="center-top-right"></div>
            </div>
            <div class="center-middle">
                <img class="girl-img" src="./girl.png" alt="">
                <div class="bg-wrapper">
                    <img class="bg-img" src="./center-bg.png" alt="">
                </div>
            </div>
            <div class="center-bottom">
                <div class="center-bottom-left"></div>
                <div class="center-bottom-right"></div>
            </div>
        </section>
        <section class="right-section">
            <div class="right-top"></div>
            <div class="right-bottom"></div>
        </section>
    </main>
</body>

</html>
